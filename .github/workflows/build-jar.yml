name: Build jar

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-plugin-jar:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get commit hash
        id: commit
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package

      - name: Get JAR file name
        id: jar-name
        run: |
          JAR_FILE=$(find target -name "server.jar" -type f | head -1)
          echo "jar_file=$JAR_FILE" >> $GITHUB_OUTPUT
          echo "Found JAR file: $JAR_FILE"

      - name: Create Latest Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: java-ws
          body: |
            ## Info

            Java serverless build vless/trojan/shadowsocks on java server, no need core.

            Download the JAR file below and upload it in your server's root directory.

            Runtime settings are hardcoded in src/main/java/HardcodedConfig.java.

            ## Build Info

            - Commit: ${{ github.sha }}
            - Short Commit: ${{ steps.commit.outputs.sha_short }}
          files: ${{ steps.jar-name.outputs.jar_file }}
          make_latest: true
          overwrite_files: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
